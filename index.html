<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Relevé — archive photographique du paysage</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="map" class="attrib-fix"></div>

<div class="topbar">
  <div class="title">Relevé</div>
  <div class="meta">Saint-Quentin-la-Poterie · Gard<br>archive photographique du paysage</div>
</div>

<!-- Encart position GPS de l'utilisateur -->
<div class="gps-box" id="gpsBox">
  <span class="label">Ma position</span>
  <span id="gpsCoords">recherche du signal…</span>
</div>

<!-- Visionneuse plein écran -->
<div class="fullscreen-viewer" id="fsViewer">
  <button class="fs-close" id="fsClose" aria-label="Fermer">✕</button>
  <div class="fs-controls">
    <button id="zoomIn" aria-label="Zoomer">＋</button>
    <button id="zoomOut" aria-label="Dézoomer">－</button>
  </div>
  <div class="fs-stage" id="fsStage">
    <img id="fsImage" src="" alt="">
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
