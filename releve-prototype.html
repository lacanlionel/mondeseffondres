<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Relevé — archive photographique du paysage</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17160F;
    --paper:#ECE4D3;
    --paper-dim:#DED4BD;
    --verdigris:#5E7A6E;
    --ochre:#A87B3F;
    --line: rgba(23,22,15,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--ink);font-family:'IBM Plex Mono',monospace;color:var(--paper);}
  #map{position:absolute;inset:0;}

  .topbar{
    position:absolute; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:space-between; align-items:baseline;
    padding: 18px 20px;
    pointer-events:none;
  }
  .topbar .title{
    font-family:'Fraunces', serif; font-weight:600; font-size: 20px;
    letter-spacing: 0.04em;
    color: var(--paper);
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .topbar .meta{
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color: var(--paper-dim);
    text-align:right; line-height:1.6;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  .marker{
    width:16px;height:16px;border-radius:50%;
    background: var(--ochre);
    border: 2px solid var(--paper);
    box-shadow: 0 0 0 3px rgba(168,123,63,0.25);
    cursor:pointer;
    transition: transform .15s ease;
  }
  .marker:hover{ transform: scale(1.25); }
  .marker.active{ background: var(--verdigris); }

  .panel{
    position:absolute; left:0; right:0; bottom:0; z-index:6;
    background: var(--ink);
    border-top: 1px solid var(--line);
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.22,.68,0,1);
    max-height: 62vh;
    display:flex; flex-direction:column;
  }
  .panel.open{ transform: translateY(0); }

  .panel-handle{
    display:flex; justify-content:center; padding:8px 0 2px;
  }
  .panel-handle span{
    width:36px;height:3px;border-radius:2px;background:var(--line);
  }

  .panel-body{
    display:flex; gap:16px; padding: 8px 20px 22px;
    overflow-y:auto;
  }
  .photo{
    flex: 0 0 128px;
    width:128px; height:160px;
    position:relative;
    background: linear-gradient(160deg, #6b6249, #3a3527 55%, #23201a);
    border: 1px solid rgba(236,228,211,0.15);
    filter: sepia(0.15) contrast(1.05);
  }
  .photo::after{
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(0,0,0,0.45) 100%);
  }
  .photo .frame-no{
    position:absolute; bottom:6px; left:8px;
    font-size:10px; letter-spacing:0.05em; color: var(--paper-dim);
    z-index:2;
  }

  .info{ flex:1; min-width:0; }
  .info .cat{
    font-size:10px; letter-spacing:0.12em; text-transform:uppercase;
    color: var(--ochre); margin-bottom:6px;
  }
  .info h2{
    font-family:'Fraunces', serif; font-weight:500; font-size:19px;
    margin: 0 0 8px; color: var(--paper); line-height:1.25;
  }
  .info p{
    font-size:12.5px; line-height:1.6; color: var(--paper-dim);
    margin: 0 0 10px; max-width: 46ch;
  }
  .coords{
    font-size:11px; color: var(--verdigris); letter-spacing:0.03em;
  }
  .close{
    position:absolute; top:10px; right:16px;
    background:none; border:none; color:var(--paper-dim);
    font-family:'IBM Plex Mono',monospace; font-size:11px;
    letter-spacing:0.08em; text-transform:uppercase;
    cursor:pointer; padding:6px;
  }
  .close:hover{ color: var(--paper); }

  .attrib-fix .maplibregl-ctrl-attrib{
    background: rgba(23,22,15,0.55) !important;
    color: var(--paper-dim) !important;
  }
  .attrib-fix .maplibregl-ctrl-attrib a{ color: var(--paper-dim) !important; }
</style>
</head>
<body>

<div id="map" class="attrib-fix"></div>

<div class="topbar">
  <div class="title">Relevé</div>
  <div class="meta">secteur test · 5 km²<br>prototype — données factices</div>
</div>

<div class="panel" id="panel">
  <button class="close" id="closeBtn">Fermer ✕</button>
  <div class="panel-handle"><span></span></div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
// --- Données factices — à remplacer par tes vraies photos géolocalisées (EXIF ou GPX) ---
const CENTER = [4.6450, 43.8080]; // zone de démonstration, à ajuster sur ton secteur réel
const photos = [
  { id:1, lng:4.6450, lat:43.8080, year:2014, title:"Le talus, hiver", note:"Première prise après la crue. Le sentier n'existait pas encore sous cette forme." },
  { id:2, lng:4.6480, lat:43.8095, year:2017, title:"Ligne de peupliers", note:"Alignement planté dans les années 60, coupe partielle observée trois ans plus tard." },
  { id:3, lng:4.6415, lat:43.8062, year:2019, title:"Ancien passage à gué", note:"Vestige d'un usage disparu, repéré en suivant le relevé GPS d'une marche précédente." },
  { id:4, lng:4.6500, lat:43.8055, year:2021, title:"Friche est", note:"Recolonisation végétale rapide, comparée à la même vue prise sept ans plus tôt." },
  { id:5, lng:4.6390, lat:43.8100, year:2023, title:"Point haut", note:"Vue d'ensemble du secteur, repère utilisé pour recaler les prises suivantes." },
];

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/positron',
  center: CENTER,
  zoom: 15,
  pitch: 0,
  attributionControl: true,
});

map.addControl(new maplibregl.NavigationControl({ showCompass:false }), 'bottom-right');

map.on('load', () => {
  // Repeindre le style OpenFreeMap dans notre palette, sans dépendre des noms exacts de calques
  const layers = map.getStyle().layers;
  layers.forEach(layer => {
    const id = layer.id;
    try{
      if(layer.type === 'background'){
        map.setPaintProperty(id, 'background-color', '#ECE4D3');
      } else if(layer.type === 'fill'){
        if(/water/i.test(id)){
          map.setPaintProperty(id, 'fill-color', '#B9C7C0');
        } else if(/park|wood|forest|landuse|land|vegetation|grass/i.test(id)){
          map.setPaintProperty(id, 'fill-color', '#D9D2BB');
        } else if(/building/i.test(id)){
          map.setPaintProperty(id, 'fill-color', '#D8CDB4');
        }
      } else if(layer.type === 'line'){
        if(/water|river|stream/i.test(id)){
          map.setPaintProperty(id, 'line-color', '#8FA79D');
        } else if(/road|street|highway|path|track/i.test(id)){
          map.setPaintProperty(id, 'line-color', '#B7A98A');
        } else if(/building/i.test(id)){
          map.setPaintProperty(id, 'line-color', '#C4B896');
        }
      } else if(layer.type === 'symbol'){
        if(/poi|place|label/i.test(id)){
          map.setPaintProperty(id, 'text-color', '#8A7E60');
          map.setPaintProperty(id, 'text-halo-color', '#ECE4D3');
        }
      }
    }catch(e){ /* certaines propriétés n'existent pas selon le type de calque : on ignore */ }
  });

  // Marqueurs-catalogue
  photos.forEach(p => {
    const el = document.createElement('div');
    el.className = 'marker';
    el.addEventListener('click', () => openPanel(p, el));
    new maplibregl.Marker({ element: el })
      .setLngLat([p.lng, p.lat])
      .addTo(map);
  });
});

const panel = document.getElementById('panel');
const panelBody = document.getElementById('panelBody');
const closeBtn = document.getElementById('closeBtn');
let activeEl = null;

function openPanel(p, el){
  if(activeEl) activeEl.classList.remove('active');
  el.classList.add('active');
  activeEl = el;

  panelBody.innerHTML = `
    <div class="photo"><div class="frame-no">N° ${String(p.id).padStart(3,'0')}</div></div>
    <div class="info">
      <div class="cat">Relevé ${p.year}</div>
      <h2>${p.title}</h2>
      <p>${p.note}</p>
      <div class="coords">${p.lat.toFixed(5)}° N · ${p.lng.toFixed(5)}° E</div>
    </div>
  `;
  panel.classList.add('open');
  map.easeTo({ center:[p.lng, p.lat], duration:500 });
}

closeBtn.addEventListener('click', () => {
  panel.classList.remove('open');
  if(activeEl) activeEl.classList.remove('active');
  activeEl = null;
});
</script>
</body>
</html>
